# Don't print a new line at the start of the prompt
format = """
[ОЈ ](bold green)$directory(bold blue)$git_branch$git_status(bold green)$rust$c$python$nodejs$go$haskell$dart$perl$java$php$lua[вқҜ](bold yellow)[вқҜ](bold purple)[вқҜ](bold blue) """
add_newline = false

# Make prompt a single line instead of two lines
[line_break]
disabled = true

# Replace the "вқҜ" symbol in the prompt with "вһң"
# [character]                         # The name of the module we are configuring is "character"
# success_symbol = "[вһң](bold green)"  # The "success_symbol" is set to "вһң" with color "bold green"

# Use custom format
# format = """
# [в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ>](bold green)
# [в”Ӯ](bold green)$directory$rust$package
# [в””в”Җ>](bold green) """

# Disable the package module, hiding it from the prompt completely

[character]
error_symbol = "[вң—](bold red) "
success_symbol = "[ОЈ](bold green)"
vicmd_symbol = "[ОЈ](bold red)"
#format = "$symbol [|](bold bright-black) "
#success_symbol = "[пһҹ ](bold green)"



[package]
format = "[$symbol$version]($style) "
disabled = true
scan_timeout = 60
add_newline = false
symbol = "пЈ– "

[directory]
style = "bold blue"

[cmd_duration]
format = "[$duration]($style) "

[status]
disabled = false
format = "[$symbol $status]($style) "
not_found_symbol = "пҖҗ"
not_executable_symbol = "п‘®"
sigint_symbol = "пӯҰ"
map_symbol = true

[git_branch]
format = "[$symbol$branch]($style) "

[shell]
unknown_indicator = "mystery shell"
style = "cyan bold"
disabled = true

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = "оҳҶ "

[lua]
format = "[$symbol($version )]($style)"
symbol = "оҳ  "

[nodejs]
format = "[$symbol($version )]($style)"
#symbol = ""

[php]
format = "[$symbol($version )]($style)"
symbol = "оҳҲ "

[java]
format = "[${symbol}(${version} )]($style)"
symbol = "оү– "

[rust]
format = "[$symbol($version )]($style)"
symbol = "рҹҰҖ "

[golang]
format = "[$symbol($version )]($style)"
symbol = "оҳҰ "

[c]
format = "[$symbol($version )]($style)"
symbol = "оҳһ "

[perl]
format = "[$symbol($version )]($style)"
symbol = "оқ© "

[dart]
format = "[$symbol($version )]($style)"
symbol = "оһҳ "

[haskell]
format = "[$symbol($version )]($style)"
symbol = "оқ· "


[battery]
full_symbol = "рҹ”Ӣ "
charging_symbol = "вҡЎпёҸ "
discharging_symbol = "рҹ’Җ "

[[battery.display]]
threshold = 10
style = "bold red"





